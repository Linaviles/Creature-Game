<!doctype html>

<html lang="en">

<head>

    <meta charset="utf-8">

    <title> CREATURE SALON </title>

    <link rel="stylesheet" href="menu.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="menu.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Alata&family=Chiron+GoRound+TC:wght@200..900&family=Emilys+Candy&family=Freckle+Face&family=Kablammo&display=swap"
        rel="stylesheet">

</head>

<body>

    <div id="starting-screen" class="game-screen">
        <div class="title">

            <h1> CREATURE SALON </h1>

        </div>

        <div class="buttons">

            <button id="start"> START </button>

            <div class="divider"> </div>

            <button id="credits"> CREDITS </button>

        </div>

        <!-- The Modal -->
        <div id="myModal" class="modal">

            <!-- Modal content -->
            <div class="modal-content">
                <span class="close">&times;</span>
                <p> This project was created by: </p>
                <p> Lindsay Aviles </p>
                <p> Darwin Chang </p>
                <p> Cesar Marcial </p>
                <p> Jacobi Raisner </p>
                <p> Osaze Sowelle </p>
                <p> Ella Ty </p>
            </div>

        </div>
    </div>

    <div id="front-shop" class="game-screen">

        <div class=lineContainer>

            <div class="line" id="lineCreature01"></div>
            <div class="line" id="lineCreature02"></div>
            <div class="line" id="lineCreature03"></div>
            <div class="line" id="lineCreature04"></div>
            <div class="line" id="lineCreature05"></div>
            <div class="line" id="lineCreature06"></div>
            <div class="line" id="lineCreature07"></div>
            <div class="line" id="lineCreature08"></div>

        </div>

        <div id="service-box">You might want to go in order.</div>

    </div>

    <div id="grooming-shop" class="game-screen">
        <div id="groomContainer" ondrop="drop(event)" ondragover="dragover(event)">
            <div id="groomCreature"></div>
            <div id="dropTool"></div>
        </div>

        <div id="tool-placements">
            <img id="hairBrush" draggable="true" ondragstart="dragstart(event)" src="art/hairBrush.png">
            <img id="toothBrush" draggable="true" ondragstart="dragstart(event)" src="art/toothBrush.png">
            <img id="nailClippers" draggable="true" ondragstart="dragstart(event)" src="art/nailClippers.png">
            <img id="nailFile" draggable="true" ondragstart="dragstart(event)" src="art/nailFile.png">
            <img id="shower" draggable="true" ondragstart="dragstart(event)" src="art/shower.png">
            <img id="scissors" draggable="true" ondragstart="dragstart(event)" src="art/scissors.png">
        </div>

        <div id="health-bar">
            <img id="heart01" data-index="1" src="art/heart.png">
            <img id="skull01" src="art/testSkull.webp">
            <img id="heart02" data-index="2" src="art/heart.png">
            <img id="skull02" src="art/testSkull.webp">
            <img id="heart03" data-index="3" src="art/heart.png">
        </div>
        <div id="completion"><button class="return" id="clickable">Good Job!</button></div>
    </div>

    <div id="game-over" class="game-screen">
        <h1>GAME OVER</h1>
        <h2>Your shift ended early and so has your life..</h2>
        <button id="refresh" class="buttons">Try Again?</button>
    </div>

    <div id="shift-end" class="game-screen">
        <h1>Congratulation!</h1>
        <h2>You finished your shift, will you survive tomorrow?</h2>
    </div>

    <!-- // music which loops when pressesing start in game // -->
    <audio id="bg-music" loop>
        <source src="music/Game-Theme-1.mp3" type="audio/mpeg">
    </audio>

    <!-- sound that plays when you click "start"-->
    <audio id="start-sound">
        <source src="music/Click-Sound.mp3" type="audio/mpeg">
    </audio>
    <!-- menu music soundtrack stuff -->
    <audio id="menu-music" loop>
        <source src="music/Menu-Theme.mp3" type="audio/mpeg">
    </audio>
</body>

</html>
